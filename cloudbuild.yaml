steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/carbontrace/carbontrace-app:$COMMIT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/carbontrace/carbontrace-app:latest'
      - '.'

  # Step 2: Push the image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/carbontrace/carbontrace-app'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'carbontrace-app'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/carbontrace/carbontrace-app:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--service-account=carbontrace-sa@$PROJECT_ID.iam.gserviceaccount.com'
      - '--set-env-vars=GCP_PROJECT_ID=$PROJECT_ID,GCP_LOCATION=us-central1,NODE_ENV=production'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--concurrency=80'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/carbontrace/carbontrace-app:$COMMIT_SHA'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/carbontrace/carbontrace-app:latest'

options:
  logging: CLOUD_LOGGING_ONLY
